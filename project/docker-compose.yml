# Use postgres/example user/password credentials
version: '3.9'

services:
  # Database container
  db:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test
    ports:
      - "5432:5432"
    networks:
      - my_network
    volumes:
      - ./database/Telemetry.sql:/docker-entrypoint-initdb.d/Telemetry.sql
      - ./custom/mount:/var/lib/postgresql/data
      - ./backup:/backups

networks:
  my_network:
    driver: bridge
